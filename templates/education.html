{% extends "base.html" %}

{% block content %}
<!-- Education Section (Separate Page) -->
<section id="education-page" class="min-h-screen py-32 bg-lightBg dark:bg-darkBg transition-colors duration-300">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 reveal active">
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 text-slate-800 dark:text-white">
                My <span
                    class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">Education</span>
            </h1>
            <div class="w-20 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded mx-auto mb-8">
            </div>
            <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400">
                A timeline of my academic background and qualifications.
            </p>
        </div>

        <div
            class="space-y-12 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 dark:before:via-slate-700 before:to-transparent">
            {% for edu in cv.education %}
            <div
                class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                <div
                    class="flex items-center justify-center w-12 h-12 rounded-full border-4 border-white dark:border-slate-800 bg-gradient-to-r from-indigo-500 to-purple-500 text-white shadow-lg shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 z-10 timeline-card transition-transform duration-300 group-hover:scale-110">
                    <i class="fas fa-university text-lg"></i>
                </div>
                <div
                    class="w-[calc(100%-5rem)] md:w-[calc(50%-3rem)] bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-sm hover:shadow-xl border border-slate-100 dark:border-slate-700 timeline-card transition-all duration-300 transform group-hover:-translate-y-2">
                    <span
                        class="font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-purple-500 text-sm mb-2 block"><i
                            class="far fa-calendar-alt mr-2 text-indigo-500"></i>{{ edu.duration }}</span>
                    <h4 class="text-2xl font-bold text-slate-800 dark:text-white mb-2">{{ edu.degree }}</h4>
                    <p class="text-slate-600 dark:text-slate-400 text-lg mb-4">{{ edu.institution }}</p>
                    {% if edu.score %}
                    <span
                        class="inline-block px-4 py-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 text-sm font-bold rounded-lg border border-indigo-100 dark:border-indigo-800">{{
                        edu.score }}</span>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="mt-20 text-center">
            <a href="{{ url_for('home') }}"
                class="inline-flex items-center px-8 py-3 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-white hover:bg-slate-200 dark:hover:bg-slate-700 font-medium transition-all shadow-md hover:shadow-lg">
                <i class="fas fa-arrow-left mr-2"></i> Back to Home
            </a>
        </div>
    </div>
</section>
{% endblock %}
